<div class="container">
  <h1>Product Search App</h1>

  <form [formGroup]="form">
    <input
      type="text"
      formControlName="search"
      placeholder="Search products by title"
      class="search-input"
    />
  </form>

  <div *ngIf="loading" class="state-message">Loading products...</div>

  <div *ngIf="!loading && errorMessage" class="state-message error">
    {{ errorMessage }}
  </div>

  <div
    *ngIf="!loading && !errorMessage && product.length === 0"
    class="state-message"
  >
    No products found.
  </div>

  <div
    *ngIf="!loading && !errorMessage && product.length > 0"
    class="product-list"
  >
    <div *ngFor="let product of product" class="product-card">
      <img [src]="product.image" [alt]="product.title" />
      <h3>{{ product.title }}</h3>
      <p><strong>Category:</strong> {{ product.category }}</p>
      <p><strong>Price:</strong> ${{ product.price }}</p>
      <p>{{ product.description }}</p>
    </div>
  </div>
</div>
